# ─────────────────────────────────────────────────────────────────────────────
# WorkWise SaaS — Nginx Reverse Proxy Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Place your TLS certificate at:
#   ./nginx/certs/workwise.crt   (full-chain PEM)
#   ./nginx/certs/workwise.key   (private key PEM)
#
# If you are using Cloudflare Tunnel or a load balancer that terminates TLS
# upstream, remove the HTTPS server block and keep only the HTTP upstream.
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: Gunicorn Django API ─────────────────────────────────────────────
upstream django_backend {
    least_conn;
    server backend:8000 fail_timeout=0;
    # Add more Gunicorn replicas here if you scale horizontally:
    # server backend_2:8000 fail_timeout=0;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.workwise.co.ke;     # ← change to your real API domain

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate      /etc/nginx/certs/workwise.crt;
    ssl_certificate_key  /etc/nginx/certs/workwise.key;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout     5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 15M;           # Support CSV bulk imports
    client_body_timeout  60s;
    client_header_timeout 30s;

    # ── Django static files (collected by collectstatic → /staticfiles) ───────
    location /static/ {
        alias /staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        access_log off;
    }

    # ── M-Pesa webhook callbacks — no rate limiting, must reach Django fast ────
    location /api/mpesa/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── All other API calls ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Buffer settings for PDF payslip downloads
        proxy_buffering         on;
        proxy_buffer_size       4k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Restrict admin to internal / VPN IPs in production
        # allow 10.0.0.0/8;
        # deny  all;
    }

    # ── Health check (used by Docker healthcheck & load balancers) ────────────
    location = /health/ {
        access_log off;
        proxy_pass http://django_backend;
    }

    # ── Block hidden files and common attack patterns ─────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
