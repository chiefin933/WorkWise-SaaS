# ─────────────────────────────────────────────────────────────────────────────
# WorkWise SaaS — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy .env.prod.example → .env.prod and fill in all values.
#   2. Ensure a valid TLS certificate is placed at ./nginx/certs/ (or use
#      Certbot / Cloudflare Tunnel — see nginx.conf).
#   3. Run `docker compose -f docker-compose.prod.yml exec backend python manage.py migrate`
#      on first deploy.
#
# Services:
#   nginx    – Reverse proxy + TLS termination + static file serving.
#   backend  – Gunicorn WSGI server running the Django API.
#   worker   – Celery worker for async task processing (payslips, M-Pesa).
#   redis    – Message broker for Celery & Django cache layer.
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

x-backend-env: &backend-env
  env_file: .env.prod
  environment:
    - DJANGO_DEBUG=False

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: workwise_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workwise_net

  # ── Django / Gunicorn ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workwise_backend
    restart: unless-stopped
    <<: *backend-env
    # Gunicorn: 4 sync workers, 120 s timeout, logging to stdout.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --worker-class sync
               --timeout 120
               --access-logfile -
               --error-logfile -"
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - workwise_net

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workwise_worker
    restart: unless-stopped
    <<: *backend-env
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=2
        --queues=default
        --max-tasks-per-child=50
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - workwise_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workwise_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # TLS certificate + private key
      - staticfiles:/staticfiles:ro             # Serve Django static files directly
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - workwise_net

volumes:
  redis_data:
    driver: local
  staticfiles:
    driver: local

networks:
  workwise_net:
    driver: bridge
