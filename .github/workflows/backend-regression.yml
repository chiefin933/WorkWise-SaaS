name: Backend Regression Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-regression:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: ""
      DB_HOST: ""
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret
      CLERK_AUDIENCE: api://workwise
      CLERK_ALLOWED_ISSUERS: https://clerk.example
      CLERK_JWKS_URL: https://clerk.example/.well-known/jwks.json
      MPESA_ENABLED: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical regression tests
        run: |
          python manage.py test \
            core.tests \
            core.tests_authentication \
            core.test_jwks_integration \
            core.tests_rbac_mpesa \
            reports.tests \
            payroll.tests_mpesa_b2c \
            payroll.tests_mpesa \
            tenants.tests
