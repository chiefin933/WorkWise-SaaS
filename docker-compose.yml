version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: workwise_db
    restart: always
    environment:
      POSTGRES_DB: workwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workwise_backend
    restart: always
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/workwise
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-development-secret-key-123456
    depends_on:
      - db

volumes:
  pgdata:
